<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dia do Nada</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Comic Sans MS', 'Impact', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000;
            color: #fff;
            overflow: hidden;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- TELA 1: CADEADO --- */
        #screen1 {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            z-index: 10;
            width: 90%;
            max-width: 340px;
        }

        .padlock-container {
            font-size: 85px;
            cursor: pointer;
            animation: pulse 1.2s infinite ease-in-out;
            user-select: none;
            margin-bottom: 15px;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        .instruction {
            font-size: 1.1rem;
            margin-bottom: 25px;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
            line-height: 1.3;
        }

        /* Começa escondido por padrão */
        .input-area {
            display: none; 
            flex-direction: column;
            gap: 12px;
            width: 100%;
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        input {
            padding: 14px;
            border-radius: 8px;
            border: 2px solid #fff;
            background: #111;
            color: #fff;
            text-align: center;
            font-size: 16px; 
            width: 100%;
        }

        button {
            padding: 14px;
            border: none;
            border-radius: 8px;
            background-color: #d11a2a;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            min-height: 48px;
            transition: 0.2s;
        }

        button:active {
            background-color: #ff2e3b;
            transform: scale(0.98);
        }

        .hint {
            color: #ff4d4d;
            margin-top: 15px;
            font-size: 0.95rem;
            font-weight: bold;
            min-height: 40px;
            line-height: 1.3;
        }

        /* Chuva de Aranhas */
        .falling-spidey {
            position: absolute;
            top: -50px;
            pointer-events: none;
            animation: fall linear forwards;
            z-index: 1;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(105dvh) rotate(360deg); opacity: 0; }
        }

        /* --- TELA 2: HOMEM ARANHA DA TEIA --- */
        #screen2 {
            display: none;
            position: relative;
            width: 100%;
            height: 100dvh;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .spidey2-container {
            position: absolute;
            top: -450px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: top 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.2);
            width: 100%;
        }

        .spidey2-container.descended {
            top: 0px;
        }

        .spidey2-container.ascended {
            top: -650px !important;
            transition: top 0.8s ease-in;
        }

        .web-line {
            width: 2px;
            height: 100px;
            background-color: #eee;
            box-shadow: 0 0 5px #fff;
        }

        .spidey2-img {
            width: 140px;
            cursor: pointer;
        }

        .speech-bubble {
            position: relative;
            background: #fff;
            color: #000;
            border: 3px solid #000;
            border-radius: 10px;
            padding: 10px;
            font-weight: bold;
            font-size: 1rem;
            width: 160px;
            text-align: center;
            box-shadow: 4px 4px 0px #d11a2a;
            margin-top: 8px;
            text-transform: uppercase;
        }

        .speech-bubble:after {
            content: '';
            position: absolute;
            top: -13px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 0 13px 13px;
            border-style: solid;
            border-color: #fff transparent;
            display: block;
            width: 0;
        }
        
        .speech-bubble:before {
            content: '';
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 0 15px 15px;
            border-style: solid;
            border-color: #000 transparent;
            display: block;
            width: 0;
            z-index: -1;
        }

        .letter-modal {
            display: none;
            background: white;
            color: black;
            border: 3px dashed #d11a2a;
            padding: 18px;
            border-radius: 12px;
            width: 85%;
            max-width: 310px;
            text-align: center;
            box-shadow: 0 0 20px rgba(255,255,255,0.15);
            position: absolute;
            bottom: 8%;
            animation: popIn 0.3s forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        .letter-text {
            font-size: 1rem;
            margin-bottom: 15px;
            line-height: 1.4;
            font-weight: bold;
        }

        /* --- TELA 3: EXPLOSÃO --- */
        #spidey3 {
            display: none;
            position: absolute;
            width: 240px;
            z-index: 100;
            animation: explode 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.3) forwards;
        }

        @keyframes explode {
            0% { transform: scale(0) rotate(0deg); filter: brightness(3); }
            100% { transform: scale(1) rotate(720deg); }
        }

        .flash {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100dvh;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 99;
        }

        .flash.active {
            animation: flashAnim 0.3s ease-out;
        }

        @keyframes flashAnim {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="flash" id="flashScreen"></div>

    <div id="screen1">
        <div class="padlock-container" id="padlock" onclick="revealInputArea()">🔒</div>
        <p class="instruction">cadeado ta pulsando, voce tem mão, é só clicar</p>
        
        <div class="input-area" id="inputArea">
            <input type="text" id="passwordInput" placeholder="Digite a data...">
            <button onclick="checkPassword()">Desbloquear</button>
        </div>
        <div class="hint" id="hintText"></div>
    </div>

    <div id="screen2">
        <div class="spidey2-container" id="spideyContainer2">
            <div class="web-line"></div>
            <img src="spiderman2.jpg" alt="Homem Aranha Teia" class="spidey2-img" onclick="openLetter()">
            <div class="speech-bubble">Abre essa porcaia</div>
        </div>

        <div class="letter-modal" id="letterModal">
            <p class="letter-text">É muito dificil n me estressar com você, ainda não vou falar com você e esse é seu presente de dia do nada, passar bem, tchau!</p>
            <button onclick="triggerFinalSequence()">Finalizar</button>
        </div>
    </div>

    <img src="spiderman3.jpg" alt="Spidey 3" id="spidey3">

    <script>
        // --- TEMPESTADE DE MINI SPIDEYS (150ms = Muito mais Aranhas) ---
        function createMiniSpidey() {
            if (document.getElementById('screen1').style.display === 'none') return;
            
            const spidey = document.createElement('img');
            spidey.src = 'spiderman1.jpg'; 
            spidey.classList.add('falling-spidey');
            
            spidey.style.left = Math.random() * 90 + 'vw'; 
            spidey.style.animationDuration = (Math.random() * 2 + 2.5) + 's'; 
            spidey.style.width = (Math.random() * 12 + 20) + 'px'; 
            
            document.body.appendChild(spidey);
            
            setTimeout(() => { spidey.remove(); }, 4500);
        }
        setInterval(createMiniSpidey, 150);

        // --- INTERAÇÃO DO CADEADO ---
        function revealInputArea() {
            const inputArea = document.getElementById('inputArea');
            inputArea.style.display = 'flex';
            
            // Foca automaticamente no campo para abrir o teclado do celular
            setTimeout(() => {
                document.getElementById('passwordInput').focus();
            }, 50);
        }

        // --- VALIDAÇÃO DA SENHA ATUALIZADA ---
        function checkPassword() {
            const input = document.getElementById('passwordInput').value.trim();
            const hintElement = document.getElementById('hintText');
            
            const senhaCorreta = "13092024"; 

            if (input === senhaCorreta) {
                transitionToScreen2();
            } else {
                hintElement.innerText = "nossa data especial, você lembra Gustavo?";
            }
        }

        function transitionToScreen2() {
            document.getElementById('screen1').style.display = 'none';
            document.getElementById('screen2').style.display = 'flex';
            
            setTimeout(() => {
                document.getElementById('spideyContainer2').classList.add('descended');
            }, 150);
        }

        function openLetter() {
            document.getElementById('letterModal').style.display = 'block';
        }

        function triggerFinalSequence() {
            document.getElementById('letterModal').style.display = 'none';
            
            const container2 = document.getElementById('spideyContainer2');
            container2.classList.remove('descended');
            container2.classList.add('ascended');

            setTimeout(() => {
                const flash = document.getElementById('flashScreen');
                flash.classList.add('active');

                const spidey3 = document.getElementById('spidey3');
                spidey3.style.display = 'block';
            }, 850);
        }
    </script>
</body>
</html>
